<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seriesfera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./scss/main.scss" />
    <script src="./js/main.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__title">Seriesfera: Buscador de series</h1>
    </header>

    <main class="main">
      <div class="search-and-favs">
        <section class="search">
          <form class="search__form">
            <input
              class="js_searchInput search__input"
              type="text"
              name="search"
              id="search"
            />
            <button class="js_searchBtn search__btn" type="submit">
              Buscar
            </button>
          </form>
        </section>

        <section class="favorites">
          <h2 class="favorites__title">Mis series favoritas</h2>
          <ul class="favorites__list">
            <li class="favorites__item">
              <img
                class="favorites__img"
                src="https://placehold.co/210x295/e0fbfc/5f9ea0/?text=TV"
                alt=""
              />
              <p class="favorites__text">Stranger Things</p>
              <button class="favorites__btn">
                <svg
                  class="icon icon-heart"
                  xmlns="http://www.w3.org/2000/svg"
                  height="24px"
                  viewBox="0 -960 960 960"
                  width="24px"
                  fill="#e0fbfc"
                >
                  <path
                    d="m480-120-58-52q-101-91-167-157T150-447.5Q111-500 95.5-544T80-634q0-94 63-157t157-63q52 0 99 22t81 62q34-40 81-62t99-22q94 0 157 63t63 157q0 46-15.5 90T810-447.5Q771-395 705-329T538-172l-58 52Zm0-108q96-86 158-147.5t98-107q36-45.5 50-81t14-70.5q0-60-40-100t-100-40q-47 0-87 26.5T518-680h-76q-15-41-55-67.5T300-774q-60 0-100 40t-40 100q0 35 14 70.5t50 81q36 45.5 98 107T480-228Zm0-273Z"
                  />
                </svg>

                <svg
                  class="icon icon-broken"
                  xmlns="http://www.w3.org/2000/svg"
                  height="24px"
                  viewBox="0 -960 960 960"
                  width="24px"
                  fill="#e0fbfc"
                >
                  <path
                    d="M481-83Q347-218 267.5-301t-121-138q-41.5-55-54-94T80-620q0-92 64-156t156-64q45 0 87 16.5t75 47.5l-62 216h120l-34 335 114-375H480l71-212q25-14 52.5-21t56.5-7q92 0 156 64t64 156q0 48-13 88t-55 95.5q-42 55.5-121 138T481-83Zm-71-186 21-211H294l75-263q-16-8-33.5-12.5T300-760q-58 0-99 41t-41 99q0 31 11.5 62t40 70.5q28.5 39.5 77 92T410-269Zm188-48q111-113 156.5-180T800-620q0-58-41-99t-99-41q-11 0-22 1.5t-22 5.5l-24 73h116L598-317Zm110-363ZM294-480Z"
                  />
                </svg>
              </button>
            </li>
          </ul>
        </section>
      </div>

      <section class="results">
        <ul class="js_resultsUl results__list">
          <!-- <li class="results__item">
            <img
              class="results__img"
              src="https://placehold.co/210x295/e0fbfc/5f9ea0/?text=TV"
              alt=""
            />
            <p class="results__text">Título</p>
          </li> -->
        </ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__copy">&copy; 2026. Hecho por Cris con 🩵</p>
      <p class="footer__api">Datos de TVMaze API.</p>
      <a
        class="footer__link"
        href="https://github.com/Adalab/modulo-2-evaluacion-final-CrisOnWeb"
        target="_blank"
        rel="noopener"
        >Ver en GitHub</a
      >
    </footer>
  </body>
</html>
