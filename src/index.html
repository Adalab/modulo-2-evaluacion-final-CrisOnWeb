<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seriesfera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./scss/main.scss" />
    <script src="./js/main.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__title">Seriesfera: Buscador de series</h1>
    </header>
    <main class="main">
      <section class="search">
        <form class="search__form">
          <input class="search__input" type="text" name="search" id="search" />
          <button class="search__btn" type="submit">Buscar</button>
        </form>
      </section>
      <section class="favorites">
        <h2 class="favorites__title">Mis series favoritas</h2>
        <ul class="favorites__list">
          <li class="favorites__item">
            <p class="favorites__text">Stranger Things</p>
            <button class="favorites_btn">icono</button>
          </li>
        </ul>
      </section>
      <section class="results">
        <ul class="results__list">
          <li class="results__item">
            <img
              class="results__img"
              src="https://placehold.co/210x295/f5f5f5/666666/?text=TV"
              alt=""
            />
            <p class="results__text">Título</p>
          </li>
        </ul>
      </section>
    </main>
    <footer class="footer">
      <p>Hecho por Cris 💻</p>
      <p>Datos de TVMaze API</p>
      <a
        href="https://github.com/Adalab/modulo-2-evaluacion-final-CrisOnWeb"
        target="_blank"
        rel="noopener"
        >Ver en GitHub</a
      >
    </footer>
  </body>
</html>
